version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: commande-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: commande_db
    ports:
      - "3308:3306"
    volumes:
      - commande_mysql_data:/var/lib/mysql
    networks:
      - commande-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
  redis:
    image: redis:7.0
    container_name: commande-redis
    restart: always
    ports:
      - "6381:6379"
    volumes:
      - commande_redis_data:/data
    networks:
      - commande-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: commande-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - commande-network
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: commande-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - commande-network
  commande-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: commande-service-app
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/commande_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PRODUIT_SERVICE_URL: http://produit-service-app:8082
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - commande-network
volumes:
  commande_mysql_data:
  commande_redis_data:
networks:
  commande-network:
    driver: bridge
